name: Deployment
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and Deploy
        run: |
          cd /home/flavian/ntusa_official_website_mvp
          
          git fetch origin main
          git reset --hard origin/main
          
        
          npm install

          npm run build
          pm2 restart ntusa-website

      - name: Notify Discord on Success
        if: success() # 只有前面的步驟都成功才會執行這個通知
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "台大學生會官網部署成功！"}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Slack on Success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"status\": \"部署成功\",
            \"repo\": \"${{ github.repository }}\",
            \"actor\": \"${{ github.actor }}\",
            \"log_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.SLACK_WORKFLOW_URL }}

      - name: Notify Discord on Failure
        if: failure() # 如果前面的部署步驟失敗，就會觸發這個通知
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "警告：台大學生會官網部署失敗，請檢查 GitHub Actions Log。"}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Notify Slack on Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
          --data "{
            \"status\": \"部署失敗\",
            \"repo\": \"${{ github.repository }}\",
            \"actor\": \"${{ github.actor }}\",
            \"log_url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
          }" \
          ${{ secrets.SLACK_WORKFLOW_URL }}
